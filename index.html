<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPERHOUSE INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 4px solid #facc15; color: #facc15; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen pb-20">

    <!-- Header / Profile Section -->
    <header class="bg-gray-800 p-4 sticky top-0 z-50 shadow-xl border-b border-yellow-500">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-500">PAPERHOUSE INC</h1>
            <div id="profile-area" class="text-right">
                <p id="display-username" class="text-sm font-mono text-blue-400">@loading...</p>
                <p class="text-xl font-bold">₱ <span id="user-balance">0.00</span></p>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <nav class="flex justify-around bg-gray-800 border-b border-gray-700">
        <button onclick="switchTab('earn')" id="tab-earn" class="py-3 px-6 active-tab uppercase font-bold tracking-widest">Earn</button>
        <button onclick="switchTab('promote')" id="tab-promote" class="py-3 px-6 uppercase font-bold tracking-widest">Promote</button>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto p-4">
        
        <!-- Earn Section -->
        <section id="section-earn" class="space-y-6">
            <div>
                <h2 class="text-lg font-semibold mb-3 border-l-4 border-red-500 pl-2">YouTube Watch (₱0.01)</h2>
                <div id="list-yt-watch" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div>
                <h2 class="text-lg font-semibold mb-3 border-l-4 border-red-600 pl-2">YouTube Subscribe (₱0.03)</h2>
                <div id="list-yt-sub" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div>
                <h2 class="text-lg font-semibold mb-3 border-l-4 border-blue-500 pl-2">Facebook Follow (₱0.01)</h2>
                <div id="list-fb-follow" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div>                <h2 class="text-lg font-semibold mb-3 border-l-4 border-green-500 pl-2">Visit Website (₱0.01)</h2>
                <div id="list-web-visit" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <!-- Promote Section -->
        <section id="section-promote" class="hidden space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-xl font-bold mb-4">Promote Your Link</h2>
                <div class="space-y-4">
                    <select id="promo-type" class="w-full bg-gray-700 p-3 rounded border border-gray-600">
                        <option value="yt_watch">YouTube Video (Watch)</option>
                        <option value="yt_sub">YouTube Channel (Subscribe)</option>
                        <option value="fb_follow">Facebook Page (Follow)</option>
                        <option value="web_visit">Website (Visit)</option>
                    </select>
                    <input type="url" id="promo-url" placeholder="https://..." class="w-full bg-gray-700 p-3 rounded border border-gray-600 text-white">
                    <p id="promo-cost-info" class="text-sm text-yellow-400 font-bold italic">Checking link history...</p>
                    <button onclick="submitLink()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-lg transition">Submit & Pay</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Timer Overlay Modal -->
    <div id="timer-modal" class="fixed inset-0 bg-black bg-opacity-95 hidden z-[100] flex flex-col items-center justify-center p-6 text-center">
        <div id="timer-circle" class="w-32 h-32 rounded-full border-8 border-yellow-500 flex items-center justify-center text-4xl font-bold mb-6">45</div>
        <h3 class="text-2xl font-bold mb-2">DO NOT CLOSE THE TAB</h3>
        <p id="timer-instruction" class="text-gray-400">Keep the page open to receive reward.</p>
        <button id="claim-btn" class="hidden mt-8 bg-green-500 px-10 py-3 rounded-full font-bold text-xl animate-bounce">CLAIM REWARD</button>
    </div>

    <!-- Firebase Scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
