<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeGcashAds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        #video-overlay { display: none; background: rgba(0,0,0,0.95); position: fixed; inset: 0; z-index: 999; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans text-slate-900">

    <!-- Header -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-200 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black text-xl text-blue-600 italic">FreeGcashAds</h1>
                <p id="display-username" class="text-xs font-bold text-slate-500">@loading...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase tracking-widest text-slate-400">Balance</p>
                <p class="text-lg font-black text-green-600"><span id="balance">0.00</span> <span class="text-xs">PHP</span></p>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-md">
        
        <!-- Referral Section -->
        <div class="bg-blue-600 rounded-3xl p-5 text-white shadow-xl shadow-blue-200 mb-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="text-sm font-medium opacity-80">Referral Code</h3>
                    <p id="my-ref-code" class="text-2xl font-mono font-bold tracking-tighter">------</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] opacity-70">COMMISSION</p>
                    <p class="text-xl font-bold text-yellow-300">20%</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-4 bg-blue-700/50 p-3 rounded-2xl">
                <div>
                    <p class="text-[10px] opacity-70 uppercase">Total Invites</p>
                    <p id="total-invites" class="font-bold">0</p>
                </div>
                <div>
                    <p class="text-[10px] opacity-70 uppercase">Earned from Ref</p>                    <p id="total-ref-earned" class="font-bold">0.00</p>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="input-ref-code" placeholder="Enter 6-digit code" class="flex-1 px-4 py-2 rounded-xl text-slate-900 text-sm focus:outline-none">
                <button onclick="submitReferral()" class="bg-white text-blue-600 px-4 py-2 rounded-xl font-bold text-sm hover:bg-yellow-400 transition">Confirm</button>
            </div>
        </div>

        <!-- Post Link -->
        <div class="bg-white rounded-3xl p-5 border border-slate-200 mb-8 shadow-sm">
            <h3 class="font-bold text-slate-800 mb-3 flex justify-between">
                Post Video <span id="post-status" class="text-[10px] text-green-500 bg-green-50 px-2 py-1 rounded">FREE</span>
            </h3>
            <input type="text" id="yt-url" placeholder="Paste YouTube link here..." class="w-full bg-slate-100 p-3 rounded-2xl text-sm mb-3 focus:ring-2 ring-blue-500 outline-none">
            <button onclick="postLink()" id="post-btn" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-blue-600 transition duration-300">
                Post for 100 Views
            </button>
        </div>

        <!-- Watch Queue -->
        <h3 class="font-black text-lg text-slate-800 mb-4 px-1">Ads for You</h3>
        <div id="video-list" class="space-y-4">
            <!-- Dynamic Items -->
        </div>
    </main>

    <!-- Fullscreen Video Player -->
    <div id="video-overlay" class="flex flex-col items-center justify-center">
        <div class="w-full max-w-sm px-6">
            <div class="flex justify-between items-center mb-6 text-white">
                <div>
                    <h2 class="text-2xl font-black">Watching Ad</h2>
                    <p class="text-sm opacity-60">Reward: 0.01 PHP</p>
                </div>
                <div class="bg-white/10 p-4 rounded-full border border-white/20">
                    <span id="timer" class="text-3xl font-mono font-bold">30</span>
                </div>
            </div>
            
            <div class="w-full aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl ring-4 ring-white/10">
                <div id="yt-player-container"></div>
            </div>

            <p class="text-white/40 text-[10px] text-center mt-6">Do not close or reward will not be credited</p>
            <button onclick="closePlayer()" class="w-full mt-4 text-white/60 text-sm underline">Cancel & Close</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
